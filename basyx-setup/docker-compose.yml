services:
  aas-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: aas-env
    environment:
      - SERVER_PORT=8081
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./aas:/application/aas
      - ./basyx/aas-env.properties:/application/application.properties
    ports:
      - '8081:8081'
    restart: always
    depends_on:
      aas-registry:
        condition: service_healthy
      sm-registry:
        condition: service_healthy
      mongo:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: aas-registry
    ports:
      - '8082:8080'
    environment:
      - SERVER_PORT=8080
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./basyx/aas-registry.yml:/workspace/config/application.yml
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
  sm-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: sm-registry
    ports:
      - '8083:8080'
    environment:
      - SERVER_PORT=8080
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ./basyx/sm-registry.yml:/workspace/config/application.yml
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
  aas-web-ui:
    image: eclipsebasyx/aas-gui:SNAPSHOT
    container_name: aas-ui
    ports:
      - '3000:3000'
    environment:
      AAS_REGISTRY_PATH: http://localhost:8082/shell-descriptors
      SUBMODEL_REGISTRY_PATH: http://localhost:8083/submodel-descriptors
      AAS_REPO_PATH: http://localhost:8081/shells
      SUBMODEL_REPO_PATH: http://localhost:8081/submodels
      CD_REPO_PATH: http://localhost:8081/concept-descriptions
      AAS_DISCOVERY_PATH: http://localhost:8084/lookup/shells
      LOGO_PATH: Konecranes-logo.jpg
      DASHBOARD_SERVICE_PATH: http://localhost:8085/api/elements
      ALLOW_EDITING: "true"
      ENDPOINT_CONFIG_AVAILABLE: "true"
      SM_VIEWER_EDITOR: "true"
    restart: always
    depends_on:
      aas-env:
        condition: service_healthy
    volumes:
      - ./logo:/usr/src/app/dist/Logo

  opcua-operation-service:
    build:
      context: ./opcua-operation-service
      dockerfile: Dockerfile
    container_name: opcua-operation-service
    ports:
      - '8087:8087'
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mqtt-operation-bridge:
    build:
      context: ./mqtt-operation-bridge
      dockerfile: Dockerfile
    container_name: mqtt-operation-bridge
    environment:
      - BRIDGE_MQTT_BROKER_URL=tcp://mosquitto:1883
      - BRIDGE_MQTT_TOPIC_FILTER=oip/command/+/+
      - BRIDGE_MQTT_COMMAND_PREFIX=oip/command
      - BRIDGE_MQTT_REPLY_TOPIC_PREFIX=oip/reply
      - BRIDGE_AAS_BASE_URL=http://aas-env:8081
      - BRIDGE_STATION_BINDINGS_FILE=/config/stations.json
    volumes:
      - ./mqtt-operation-bridge/stations.json:/config/stations.json:ro
    ports:
      - '8091:8091'
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
      aas-env:
        condition: service_healthy

  aas-discovery:
    image: eclipsebasyx/aas-discovery:2.0.0-SNAPSHOT
    container_name: aas-discovery
    environment:
      - SERVER_PORT=8081
    volumes:
      - ./basyx/aas-discovery.properties:/application/application.properties
    ports:
      - '8084:8081'
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
  mongo:
    image: mongo:5.0.10
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    restart: always
    healthcheck:
      test: mongo
      interval: 10s
      timeout: 5s
      retries: 5
  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: mosquitto
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto:/mosquitto
    restart: always
    healthcheck:
      test:
        - CMD-SHELL
        - mosquitto_sub -p 1883 -t 'topic' -C 1 -E -i probe -W 3
      interval: 5s
      timeout: 10s
      start_period: 1s
      retries: 3
  dashboard-api:
    image: aaronzi/basyx-dashboard-api:SNAPSHOT_02
    container_name: dashboard-api
    ports:
      - '8085:8085'
    volumes:
      - ./basyx/aas-dashboard.yml:/application.yml
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
  databridge:
    image: eclipsebasyx/databridge:1.0.0-milestone-08
    container_name: databridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./databridge:/usr/share/config
    restart: always
    depends_on:
      aas-env:
        condition: service_healthy

  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile
    container_name: python-agent
    environment:
      - BASYX_BASE_URL=http://aas-env:8081
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=sm-repository/+/submodels/+/submodelElements/+/updated
      - HTTP_TIMEOUT_SECONDS=8
      - ROBOT_SETTLE_TIMEOUT_SECONDS=45
      - ROBOT_STATUS_POLL_SECONDS=0.4
      - ROBOT_MOTION_START_GRACE_SECONDS=5.0
      - SENSOR_TRUE_REARM_SECONDS=2.0
      - ROBOT_BINDINGS_FILE=/config/robot_bindings.json
      - STATION_BINDINGS_FILE=/config/aasserver.json
      - ORCHESTRATOR_LOG_CSV_PATH=/app/orchestrator_logs.csv
      - ORCHESTRATOR_SUMMARY_CSV_PATH=/app/orchestrator_summary.csv
      - SUMMARY_BATCH_SIZE=5
    volumes:
      - ../orchestrator_logs.csv:/app/orchestrator_logs.csv
      - ../orchestrator_summary.csv:/app/orchestrator_summary.csv
      - ./python-agent/robot_bindings.json:/config/robot_bindings.json:ro
      - ./databridge/aasserver.json:/config/aasserver.json:ro

    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
      aas-env:
        condition: service_healthy


