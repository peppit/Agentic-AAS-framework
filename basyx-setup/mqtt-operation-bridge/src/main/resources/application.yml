server:
  port: 8091

bridge:
  aas:
    base-url: http://aas-env:8081
  station:
    bindings: ""
    bindings-file: ""
  mqtt:
    broker-url: tcp://mosquitto:1883
    client-id: mqtt-operation-bridge
    topic-filter: oip/command/+/+
    command-prefix: oip/command
    qos: 1
    reply-topic-prefix: oip/reply
  invoke:
    timeout-ms: 8000
    conveyor:
      running-url: ""
      running-idshort: running
      running-operation-idshort: Running
      speed-url: ""
      speed-idshort: speed
      speed-operation-idshort: Speed
    robot:
      move-box-url: ""
      move-box-idshort: moveBox
      move-box-operation-idshort: MoveBox
      move-to-home-url: ""
      move-to-home-idshort: moveToHome
      move-to-home-operation-idshort: MoveToHome

logging:
  level:
    root: INFO
    com.openindustryproject: INFO
